<style>
    /* Novo Design de Pulsologia */
    .pulse-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        background: #f0f2f5;
        padding: 20px;
        border-radius: 20px;
    }
    .pulse-arm {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-top: 5px solid var(--primary);
    }
    .finger-pos {
        margin-bottom: 20px;
        padding: 10px;
        border-bottom: 1px solid #eee;
    }
    .finger-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .finger-name {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 800;
        letter-spacing: 1px;
    }
    .meridian-name {
        font-size: 0.9rem;
        font-weight: bold;
        color: var(--primary);
    }
    .pulse-options {
        display: flex;
        gap: 4px;
    }
    .btn-pulse {
        flex: 1;
        padding: 10px 2px;
        font-size: 0.65rem;
        border: 1px solid #ddd;
        background: #f8f9fa;
        cursor: pointer;
        border-radius: 6px;
        transition: 0.2s;
    }
    .btn-pulse:hover { border-color: var(--accent); }
    .pulse-sel {
        background: var(--primary) !important;
        color: white !important;
        border-color: var(--primary) !important;
        box-shadow: 0 4px 8px rgba(0,45,88,0.2);
    }
</style>

<script>
    function selPulse(btn) {
        btn.parentElement.querySelectorAll('.btn-pulse').forEach(b => b.classList.remove('pulse-sel'));
        btn.classList.add('pulse-sel');
    }
</script>
