<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉTODO 360 PRO | V. 43.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark: #000d1a; --primary: #002d58; --accent: #c5a059; --bg: #f4f7f9; --red: #d32f2f; --green: #2e7d32; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        #loginScreen { background: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border-top: 8px solid var(--accent); }
        #mainContent { display: none; padding: 20px; max-width: 1050px; margin: auto; }
        .card-pro { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); margin-bottom: 25px; }
        .etapa { display: none; }
        .ativa { display: block; }
        .titulo-secao { color: var(--accent); font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; font-size: 0.9rem; }
        
        /* Estilo das Escalas Operativas */
        .pergunta-box { background: #fdfdfd; border: 1px solid #eef0f2; border-radius: 12px; padding: 18px; margin-bottom: 12px; transition: 0.3s; }
        .pergunta-texto { display: block; font-size: 0.95rem; color: #333; margin-bottom: 12px; font-weight: 600; line-height: 1.4; }
        .opcoes-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-score { flex: 1; padding: 10px 5px; border: 1px solid #d1d5db; background: white; border-radius: 8px; cursor: pointer; font-size: 0.72rem; transition: 0.2s; min-width: 85px; font-weight: 500; }
        .opt-sel { background: var(--primary) !important; color: white !important; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,45,88,0.3); }
        
        .display-total { background: var(--dark); color: var(--accent); padding: 15px; border-radius: 12px; text-align: center; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; display: flex; justify-content: space-around; border: 1px solid var(--accent); position: sticky; top: 10px; z-index: 100; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; }
        .row-cat { background: #f9f9f9; font-weight: bold; text-align: left !important; color: var(--primary); }
        
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 10px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        .eva-regua { display: flex; height: 38px; border-radius: 8px; overflow: hidden; margin: 10px 0; border: 1px solid #ddd; }
        .eva-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 0.85rem; font-weight: bold; }
        .eva-sel { border: 4px solid black !important; transform: scaleY(1.1); z-index: 2; }
        
        textarea, input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .chart-container { height: 320px; width: 100%; margin-top: 20px; background: #fff; padding: 10px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0;">MÉTODO 360 PRO</h2>
        <p style="color:var(--accent); font-weight:bold; font-size:0.8rem; margin-bottom:20px;">V. 43.0 - ACESSO RESTRITO</p>
        <input type="password" id="pinInput" placeholder="PIN de Acesso" style="text-align:center; font-size:1.3rem; margin-bottom:20px;">
        <button class="btn-pro" onclick="autenticar()">DESBLOQUEAR PAINEL</button>
    </div>
</div>

<div id="mainContent">
    <div class="card-pro" style="border-top-color: var(--accent);">
        <h5 class="titulo-secao">📊 Análise Retrospectiva (EVA | GAD | IGI)</h5>
        <div style="display:flex; gap:10px;">
            <input type="text" id="buscaID" placeholder="ID do Paciente (Ex: MRO5005)">
            <button onclick="buscarHistorico()" style="width:160px; background:var(--accent); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">CARREGAR</button>
        </div>
        <div id="painelGrafico" style="display:none;" class="chart-container"><canvas id="graficoMaster"></canvas></div>
    </div>

    <div class="card-pro">
        <div id="e1" class="etapa ativa">
            <h5 class="titulo-secao">1. Triagem & EVA Entrada</h5>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <input type="text" id="pacienteID" placeholder="ID Paciente">
                <input type="number" id="sessaoNum" placeholder="Nº Sessão">
            </div>
            <p style="color:var(--red); font-weight:bold; margin-top:25px; font-size:0.9rem;">EVA ENTRADA (Nível de Dor Inicial):</p>
            <div class="eva-regua" id="reguaA"></div>
            <textarea id="hma" placeholder="Descreva a queixa principal e o histórico atual..." rows="5" style="margin-top:20px;"></textarea>
            <button class="btn-pro" onclick="ir(2)">AVANÇAR PARA ESCALAS</button>
        </div>

        <div id="e2" class="etapa">
            <h5 class="titulo-secao">2. Protocolos GAD-7 & IGI</h5>
            <div class="display-total">
                <span id="labelGad">GAD-7: 0</span> <span id="labelIgi">IGI: 0</span>
            </div>
            
            <h4 style="color:var(--primary); border-left: 5px solid var(--primary); padding-left: 12px; margin-bottom:15px;">Ansiedade (GAD-7)</h4>
            <div id="gadContainer"></div>

            <h4 style="color:var(--primary); border-left: 5px solid var(--accent); padding-left: 12px; margin: 35px 0 15px 0;">Sono (IGI)</h4>
            <div
