<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉTODO 360 PRO | V. 50.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark: #000d1a; --primary: #002d58; --accent: #c5a059; --bg: #f4f7f9; --red: #d32f2f; --green: #2e7d32; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        #loginScreen { background: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #mainContent { display: none; padding: 20px; max-width: 900px; margin: auto; }
        .card-pro { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); margin-bottom: 25px; }
        .etapa { display: none; }
        .ativa { display: block; }
        .titulo-secao { color: var(--accent); font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; font-size: 0.9rem; }
        
        /* Tabela de Projeção */
        .projecao-box { background: var(--dark); color: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .projecao-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: center; }
        .projecao-table th { color: var(--accent); border-bottom: 1px solid #333; padding: 5px; }
        .projecao-table td { padding: 8px; border-bottom: 1px solid #222; }
        .delta-pos { color: #81c784; font-weight: bold; } /* Melhora */
        .delta-neg { color: #e57373; font-weight: bold; } /* Piora */

        .btn-opt { flex: 1; padding: 10px 5px; font-size: 0.75rem; border: 1px solid var(--primary); background: white; cursor: pointer; border-radius: 8px; min-width: 80px; }
        .opt-sel { background: var(--primary) !important; color: white !important; font-weight: bold; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 30px; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; flex: 1; }
        .btn-back { background: #666; color: white; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
        .eva-regua { display: flex; height: 45px; border-radius: 8px; overflow: hidden; margin: 10px 0; border: 1px solid #ddd; }
        .eva-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 0.9rem; font-weight: bold; }
        .eva-sel { border: 4px solid black !important; transform: scaleY(1.1); z-index: 2; }
        .display-total { background: var(--dark); color: var(--accent); padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: flex; justify-content: space-around; margin-bottom: 20px; border: 1px solid var(--accent); }
        textarea, input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .chart-container { height: 300px; width: 100%; margin-top: 20px; background: white; padding: 10px; border-radius: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0;">MÉTODO 360</h2>
        <p style="color:var(--accent); font-weight:bold; margin-bottom:20px;">PRO INTELLIGENCE V50</p>
        <input type="password" id="pinInput" placeholder="PIN" style="text-align:center; font-size:1.3rem; margin-bottom:20px; width:100%;">
        <button class="btn-pro" style="width:100%;" onclick="autenticar()">ENTRAR</button>
    </div>
</div>

<div id="mainContent">
    <div class="card-pro" style="border-top-color: var(--accent);">
        <h5 class="titulo-secao">📊 Histórico de Evolução</h5>
        <div style="display:flex; gap:10px;">
            <input type="text" id="buscaID" placeholder="ID do Paciente">
            <button onclick="buscarDadosFirebase()" style="width:140px; background:var(--accent); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">CARREGAR</button>
        </div>
        <div id="painelGrafico" style="display:none;" class="chart-container"><canvas id="graficoMaster"></canvas></div>
    </div>

    <div class="card-pro">
        <div id="e1" class="etapa ativa">
            <h5 class="titulo-secao">1. Entrada & Projeção Histórica</h5>
            
            <div id="projecaoFicha" class="projecao-box">
                <p style="margin:0 0 10px 0; font-size: 0.7rem; color: var(--accent); text-align: center;">RESUMO DOS ÚLTIMOS ATENDIMENTOS</p>
                <table class="projecao-table">
                    <thead>
                        <tr><th>DATA</th><th>DOR (EVA)</th><th>GAD-7</th><th>IGI</th></tr>
                    </thead>
                    <tbody id="projecaoCorpo"></tbody>
                </table>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <input type="text" id="pacienteID" placeholder="ID Paciente">
                <input type="number" id="sessaoNum" placeholder="Nº Sessão">
            </div>
            <p style="color:var(--red); font-weight:bold; margin-top:25px;">EVA ENTRADA (0-10):</p>
            <div class="eva-regua" id="reguaA"></div>
            <textarea id="hma" placeholder="Queixa atual..." rows="4" style="margin-top:20px;"></textarea>
            <div class="nav-buttons">
                <button class="btn-pro" onclick="ir(2)">PRÓXIMO: ESCALAS ➔</button>
            </div>
        </div>

        <div id="e2" class="etapa">
            <h5 class="titulo-secao">2. Escalas (GAD-7 & IGI)</h5>
            <div class="display-total">
                <span id="labelGad">GAD-7: 0</span> <span id="labelIgi">IGI: 0</span>
            </div>
            <div id="gadBox"></div><div id="igiBox" style="margin-top:30px;"></div>
            <div class="nav-buttons">
                <button class="btn-back" onclick="ir(1)">⬅ VOLTAR</button>
                <button class="btn-pro" onclick="ir(3)">PRÓXIMO: FINALIZAR ➔</button>
            </div>
        </div>

        <div id="e3" class="etapa">
            <h5 class="titulo-secao">3. Saída & Eficácia</h5>
            <p style="color:var(--green); font-weight:bold;">EVA SAÍDA (0-10):</p>
            <div class="eva-regua" id="reguaD"></div>
            <textarea id="diag" placeholder="Conduta técnica..." rows="6" style="margin-top:20px;"></textarea>
            <div class="nav-buttons">
                <button class="btn-back" onclick="ir(2)">⬅ VOLTAR</button>
                <button class="btn-pro" style="background:var(--green)" id="btnSave" onclick="salvarSessao()">SALVAR ✔</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAI5X-Cb0Xf0G_cRoBX9YWqW1bn0nv-RA", authDomain: "metodo360pro-db0aa.firebaseapp.com", projectId: "metodo360pro-db0aa", storageBucket: "metodo360pro-db0aa.appspot.com", messagingSenderId: "1088396585788", appId: "1:1088396585788:web:57853a7b0ff17c8306ec39" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gadQ = ["Nervoso?", "Incontrolável?", "Excesso?", "Dificuldade relaxar?", "Inquieto?", "Irritável?", "Medo?"];
    const igiQ = ["Adormecer?", "Manter sono?", "Acordar cedo?", "Satisfação?", "Interferência?", "Visível?", "Angústia?"];

    let evaA=0, evaD=0, gTot=0, iTot=0, chartMaster=null;
    const scores = { g: {}, i: {} };

    function autenticar() { if(document.getElementById('pinInput').value === "1234") { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; initApp(); } }

    function initApp() {
        const colors = ["#28a745", "#54b33d", "#7fbe35", "#abca2d", "#d6d524", "#ffff1c", "#ffd61c", "#ffac1c", "#ff831c", "#ff591c", "#dc3545"];
        ["reguaA", "reguaD"].forEach(id => {
            const r = document.getElementById(id); r.innerHTML = '';
            colors.forEach((c, i) => r.innerHTML += `<div class="eva-item" style="background:${c}" onclick="setEva('${id[5]}', ${i}, this)">${i}</div>`);
        });
        const fillQ = (box, list, type) => {
            const container = document.getElementById(box);
            list.forEach((q, i) => {
                container.innerHTML += `<div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:8px;"><small>${i+1}. ${q}</small><div class="btn-group">${[0,1,2,3].map(v => `<button class="btn-opt" id="${type}${i}_${v}" onclick="setSc('${type}',${i},${v})">${v}</button>`).join('')}</div></div>`;
            });
        };
        fillQ('gadBox', gadQ, 'g'); fillQ('igiBox', igiQ, 'i');
    }

    function setEva(t, v, el) { if(t==='A') evaA=v; else evaD=v; el.parentElement.querySelectorAll('.eva-item').forEach(x => x.classList.remove('eva-sel')); el.classList.add('eva-sel'); }
    function setSc(t, q, v) { scores[t][q]=v; document.querySelectorAll(`[id^="${t}${q}_"]`).forEach(b => b.classList.remove('opt-sel')); document.getElementById(`${t}${q}_${v}`).classList.add('opt-sel'); gTot = Object.values(scores.g).reduce((a,b)=>a+b,0); iTot = Object.values(scores.i).reduce((a,b)=>a+b,0); document.getElementById('labelGad').innerText = `GAD-7: ${gTot}`; document.getElementById('labelIgi').innerText = `IGI: ${iTot}`; }
    function ir(n) { document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa')); document.getElementById('e'+n).classList.add('ativa'); window.scrollTo(0,0); }

    async function buscarDadosFirebase() {
        const id = document.getElementById('buscaID').value.trim().toUpperCase();
        if(!id) return;
        const snap = await db.collection("atendimentos_360").where("paciente", "==", id).get();
        if(snap.empty) return;
        
        let dds = [];
        snap.forEach(doc => {
            let d = doc.data();
            dds.push({...d, dt: d.data.seconds ? new Date(d.data.seconds * 1000) : new Date(d.data)});
        });
        dds.sort((a,b) => b.dt - a.dt); // Mais recentes primeiro para a tabela

        // Preencher Tabela de Projeção na Ficha
        const corpo = document.getElementById('projecaoCorpo');
        corpo.innerHTML = '';
        dds.slice(0, 3).forEach(d => {
            corpo.innerHTML += `<tr>
                <td>${d.dt.toLocaleDateString()}</td>
                <td>${d.eva[0]} → ${d.eva[1]}</td>
                <td>${d.scores.gad}</td>
                <td>${d.scores.igi}</td>
            </tr>`;
        });
        document.getElementById('projecaoFicha').style.display = 'block';
        document.getElementById('pacienteID').value = id;

        // Gerar Gráfico
        dds.sort((a,b) => a.dt - b.dt); // Ordem cronológica para gráfico
        document.getElementById('painelGrafico').style.display = 'block';
        if(chartMaster) chartMaster.destroy();
        chartMaster = new Chart(document.getElementById('graficoMaster'), {
            type: 'line',
            data: {
                labels: dds.map(d => d.dt.toLocaleDateString()),
                datasets: [
                    { label: 'Dor Entrada', data: dds.map(d => d.eva[0]), borderColor: 'red', tension: 0.1 },
                    { label: 'GAD-7', data: dds.map(d => d.scores.gad), borderColor: 'blue', tension: 0.1 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function salvarSessao() {
        const id = document.getElementById('pacienteID').value.trim().toUpperCase();
        if(!id) return alert("ID obrigatório");
        db.collection("atendimentos_360").add({ paciente: id, data: new Date(), sessao: document.getElementById('sessaoNum').value, eva: [evaA, evaD], scores: { gad: gTot, igi: iTot }, hma: document.getElementById('hma').value, diagnostico: document.getElementById('diag').value })
        .then(() => { alert("Salvo!"); location.reload(); });
    }
</script>
</body>
</html>
