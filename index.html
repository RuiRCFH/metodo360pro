<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉTODO 360 PRO | V. 41.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --dark: #000d1a; --primary: #002d58; --accent: #c5a059; --bg: #f0f2f5; 
            --white: #ffffff; --red: #e63946; --green: #2a9d8f; --text: #1d3557;
        }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; margin: 0; color: var(--text); }
        
        /* LOGIN PREMIUM */
        #loginScreen { background: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 9999; }
        .login-card { background: var(--white); padding: 50px; border-radius: 24px; text-align: center; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border-top: 10px solid var(--accent); }
        
        #mainContent { display: none; padding: 30px; max-width: 1100px; margin: auto; }
        
        /* CARDS */
        .card-pro { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 8px solid var(--primary); }
        .titulo-secao { color: var(--primary); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .titulo-secao::before { content: ''; width: 4px; height: 20px; background: var(--accent); display: inline-block; border-radius: 2px; }

        /* ESCALAS GAD/IGI */
        .escala-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
        .escala-item:hover { border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .pergunta-texto { font-weight: 600; font-size: 1rem; margin-bottom: 15px; display: block; color: var(--primary); }
        .opcoes-flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-score { flex: 1; padding: 12px 8px; border: 2px solid #cbd5e1; background: white; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.3s; min-width: 100px; }
        .btn-score:hover { border-color: var(--accent); color: var(--accent); }
        .opt-sel { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; box-shadow: 0 4px 10px rgba(0,45,88,0.3); }

        /* SCORE FLOATING BAR */
        .score-bar { background: var(--dark); color: var(--accent); padding: 20px; border-radius: 15px; display: flex; justify-content: space-around; margin-bottom: 25px; border: 2px solid var(--accent); position: sticky; top: 10px; z-index: 100; }
        .score-val { text-align: center; }
        .score-val small { display: block; font-size: 0.7rem; text-transform: uppercase; color: #fff; opacity: 0.7; }
        .score-val span { font-size: 1.5rem; }

        /* LÍNGUA E PULSO */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        td { background: #f8fafc; padding: 15px; text-align: center; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
        td:first-child { border-left: 1px solid #e2e8f0; border-top-left-radius: 10px; border-bottom-left-radius: 10px; text-align: left; font-weight: 700; }
        td:last-child { border-right: 1px solid #e2e8f0; border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

        .pulse-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .pulse-card { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        
        /* BOTÕES */
        .btn-pro { background: var(--primary); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: 800; width: 100%; cursor: pointer; transition: 0.4s; font-size: 1rem; }
        .btn-pro:hover { background: var(--dark); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .eva-regua { display: flex; height: 45px; border-radius: 10px; overflow: hidden; margin: 15px 0; gap: 5px; }
        .eva-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-weight: 800; border-radius: 5px; transition: 0.3s; }
        .eva-sel { border: 4px solid var(--dark) !important; transform: scale(1.1); z-index: 5; }

        textarea { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; resize: vertical; }
        .etapa { display: none; }
        .ativa { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="color:var(--primary); font-size: 1.8rem; margin:0;">MÉTODO 360</h1>
        <p style="color:var(--accent); font-weight: 700; margin-bottom: 30px;">PRO INTELLIGENCE</p>
        <input type="password" id="pinInput" placeholder="PIN" style="width:100%; padding:15px; text-align:center; border-radius:12px; border:2px solid #eee; margin-bottom:20px; font-size:1.2rem;">
        <button class="btn-pro" onclick="autenticar()">ENTRAR</button>
    </div>
</div>

<div id="mainContent">
    <div class="card-pro" style="border-left-color: var(--accent);">
        <h5 class="titulo-secao">Dashboard Retrospectivo</h5>
        <div style="display:flex; gap:15px;">
            <input type="text" id="buscaID" placeholder="ID do Paciente" style="flex:1; padding:15px; border-radius:12px; border:2px solid #eee;">
            <button onclick="buscarHistorico()" style="width:150px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">CARREGAR</button>
        </div>
        <div id="painelGrafico" style="display:none; height:350px; margin-top:25px;"><canvas id="chartMaster"></canvas></div>
    </div>

    <div class="card-pro">
        <div id="e1" class="etapa ativa">
            <h5 class="titulo-secao">1. Triagem & EVA Entrada</h5>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px; margin-bottom:20px;">
                <input type="text" id="pacienteID" placeholder="ID Paciente">
                <input type="number" id="sessaoNum" placeholder="Nº Sessão">
            </div>
            <label style="font-weight:bold; color:var(--red);">Nível de Dor na Chegada (EVA):</label>
            <div class="eva-regua" id="reguaA"></div>
            <textarea id="hma" placeholder="Descreva a queixa e histórico..." rows="4" style="margin-top:20px;"></textarea>
            <button class="btn-pro" style="margin-top:30px;" onclick="ir(2)">PRÓXIMO: ESCALAS CLÍNICAS</button>
        </div>

        <div id="e2" class="etapa">
            <div class="score-bar">
                <div class="score-val"><small>GAD-7</small><span id="valGad">0</span></div>
                <div class="score-val"><small>IGI</small><span id="valIgi">0</span></div>
            </div>
            <h5 class="titulo-secao">2. Escalas de Ansiedade e Sono</h5>
            <div id="gadBox"></div>
            <div id="igiBox" style="margin-top:40px;"></div>
            <button class="btn-pro" onclick="ir(3)">PRÓXIMO: SEMIOLOGIA LINGUAL</button>
        </div>

        <div id="e3" class="etapa">
            <h5 class="titulo-secao">3. Matriz Lingual Completa</h5>
            <div style="background:#f8fafc; padding:30px; border-radius:20px; border:3px dashed var(--accent); text-align:center; margin-bottom:30px;">
                <input type="file" id="fotoLingua" accept="image/*" style="display:none;" onchange="previewImage(this)">
                <label for="fotoLingua" style="cursor:pointer; font-weight:800; color:var(--primary);">📸 CAPTURAR IMAGEM DA LÍNGUA</label>
                <img id="previewLingua" style="max-width:100%; border-radius:15px; margin-top:15px; display:none;">
            </div>
            <table>
                <thead><tr><th>Característica</th><th>Ponta</th><th>Lados</th><th>Centro</th><th>Raiz</th></tr></thead>
                <tbody id="tbLingua"></tbody>
            </table>
            <button class="btn-pro mt-4" onclick="ir(4)">PRÓXIMO: PULSOLOGIA RADIAL</button>
        </div>

        <div id="e4" class="etapa">
            <h5 class="titulo-secao">4. Pulsologia (12 Meridianos)</h5>
            <div class="pulse-container">
                <div class="pulse-card" id="colDir">
                    <strong style="color:var(--green); display:block; margin-bottom:15px; border-bottom:2px solid var(--green);">PULSO DIREITO</strong>
                </div>
                <div class="pulse-card" id="colEsq">
                    <strong style="color:var(--red); display:block; margin-bottom:15px; border-bottom:2px solid var(--red);">PULSO ESQUERDO</strong>
                </div>
            </div>
            <button class="btn-pro mt-4" onclick="ir(5)">PRÓXIMO: SÍNTESE FINAL</button>
        </div>

        <div id="e5" class="etapa">
            <h5 class="titulo-secao">5. Conduta & EVA Saída</h5>
            <label style="font-weight:bold; color:var(--green);">Nível de Alívio na Saída (EVA):</label>
            <div class="eva-regua" id="reguaD"></div>
            <textarea id="diag" placeholder="Conduta Tung, Aurículo, Chakras e Notas..." rows="10" style="margin-top:20px;"></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                <button class="btn-pro" style="background:var(--green)" onclick="salvarSessao()">SALVAR SESSÃO</button>
                <button class="btn-pro" style="background:var(--dark); color:var(--accent);" onclick="copiarIA()">IA BRIDGE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAI5X-Cb0Xf0G_cRoBX9YWqW1bn0nv-RA", authDomain: "metodo360pro-db0aa.firebaseapp.com", projectId: "metodo360pro-db0aa", storageBucket: "metodo360pro-db0aa.appspot.com", messagingSenderId: "1088396585788", appId: "1:1088396585788:web:57853a7b0ff17c8306ec39" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const gadQuest = ["Nervoso ou ansioso?", "Controlo da preocupação?", "Preocupação com várias coisas?", "Dificuldade em relaxar?", "Inquietude?", "Irritabilidade?", "Medo que algo aconteça?"];
    const igiQuest = ["Adormecer?", "Manter o sono?", "Acordar cedo?", "Satisfação com o sono?", "Interferência diária?", "Visível aos outros?", "Angústia com o sono?"];
    const linguaLinhas = ["Pálida", "Vermelha", "Inchada", "Denteada", "Fissurada", "Sab. Branca", "Sab. Amarela"];
    const merD = ["P / IG (Cun)", "BP / E (Guan)", "PC / TA (Chi)"];
    const merE = ["C / ID (Cun)", "F / VB (Guan)", "R / B (Chi)"];

    let evaA=0, evaD=0, gTot=0, iTot=0, chartObj=null;
    const scores = { g: {}, i: {} };

    function autenticar() { if(document.getElementById('pinInput').value === "1234") { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; initApp(); } }

    function initApp() {
        // EVA
        const colors = ["#2a9d8f", "#52b788", "#74c69d", "#95d5b2", "#b7e4c7", "#d8f3dc", "#ffd6a5", "#ffadad", "#ff7096", "#ff477e", "#e63946"];
        ["reguaA", "reguaD"].forEach(id => {
            const r = document.getElementById(id);
            colors.forEach((c, i) => r.innerHTML += `<div class="eva-item" style="background:${c}" onclick="setEva('${id[5]}', ${i}, this)">${i}</div>`);
        });

        // Escalas
        const fillEscala = (box, list, type) => {
            const container = document.getElementById(box);
            list.forEach((q, i) => {
                let html = `<div class="escala-item"><span class="pergunta-texto">${i+1}. ${q}</span><div class="opcoes-flex">`;
                const limit = (type === 'g') ? 4 : 5;
                for(let v=0; v<limit; v++) html += `<button class="btn-score" id="${type}${i}_${v}" onclick="setSc('${type}',${i},${v})">${v}</button>`;
                container.innerHTML += html + `</div></div>`;
            });
        };
        fillEscala('gadBox', gadQuest, 'g');
        fillEscala('igiBox', igiQuest, 'i');

        // Língua
        const tb = document.getElementById('tbLingua');
        linguaLinhas.forEach(s => {
            tb.innerHTML += `<tr><td>${s}</td>${[1,2,3,4].map(()=>`<td><input type="checkbox" style="transform:scale(1.5)"></td>`).join('')}</tr>`;
        });

        // Pulsos
        const fillP = (box, list) => {
            const c = document.getElementById(box);
            list.forEach(m => {
                c.innerHTML += `<div style="margin-bottom:20px;"><small style="font-weight:800; color:var(--primary)">${m}</small><div class="opcoes-flex" style="margin-top:5px;">${['+++','ok','---'].map(v => `<button class="btn-score" style="min-width:40px;" onclick="selP(this)">${v}</button>`).join('')}</div></div>`;
            });
        };
        fillP('colDir', merD); fillP('colEsq', merE);
    }

    function setEva(t, v, el) { if(t==='A') evaA=v; else evaD=v; el.parentElement.querySelectorAll('.eva-item').forEach(x => x.classList.remove('eva-sel')); el.classList.add('eva-sel'); }
    function setSc(t, q, v) { scores[t][q]=v; document.querySelectorAll(`[id^="${t}${q}_"]`).forEach(b => b.classList.remove('opt-sel')); document.getElementById(`${t}${q}_${v}`).classList.add('opt-sel'); gTot = Object.values(scores.g).reduce((a,b)=>a+b,0); iTot = Object.values(scores.i).reduce((a,b)=>a+b,0); document.getElementById('valGad').innerText = gTot; document.getElementById('valIgi').innerText = iTot; }
    function selP(b) { b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('opt-sel')); b.classList.add('opt-sel'); }
    function ir(n) { document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa')); document.getElementById('e'+n).classList.add('ativa'); window.scrollTo(0,0); }
    function previewImage(i) { if (i.files && i.files[0]) { const r = new FileReader(); r.onload = (e) => { const img = document.getElementById('previewLingua'); img.src = e.target.result; img.style.display = 'block'; }; r.readAsDataURL(i.files[0]); } }

    async function buscarHistorico() {
        const id = document.getElementById('buscaID').value.trim().toUpperCase();
        const snap = await db.collection("atendimentos_360").where("paciente", "==", id).get();
        let dds = []; snap.forEach(doc => { let d = doc.data(); dds.push({...d, dt: d.data.seconds ? new Date(d.data.seconds*1000) : new Date(d.data)}) });
        if(dds.length === 0) return alert("ID não encontrado.");
        dds.sort((a,b) => a.dt - b.dt);
        document.getElementById('painelGrafico').style.display = 'block';
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('chartMaster'), {
            type: 'line',
            data: { labels: dds.map(d=>d.dt.toLocaleDateString()), datasets: [{ label: 'EVA Pré', data: dds.map(d=>d.eva[0]), borderColor: 'red' }, { label: 'EVA Pós', data: dds.map(d=>d.eva[1]), borderColor: 'green' }, { label: 'GAD-7', data: dds.map(d=>d.scores.gad), borderColor: 'blue' }, { label: 'IGI', data: dds.map(d=>d.scores.igi), borderColor: 'orange' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function salvarSessao() {
        const btn = document.querySelector('.btn-pro'); btn.innerText = "A GUARDAR...";
        const id = document.getElementById('pacienteID').value.toUpperCase();
        let url = "";
        const file = document.getElementById('fotoLingua').files[0];
        if(file) { const ref = storage.ref(`linguas/${Date.now()}_${id}`); await ref.put(file); url = await ref.getDownloadURL(); }
        db.collection("atendimentos_360").add({ paciente: id, data: new Date(), sessao: document.getElementById('sessaoNum').value, eva: [evaA, evaD], scores: { gad: gTot, igi: iTot }, hma: document.getElementById('hma').value, diagnostico: document.getElementById('diag').value, foto: url })
        .then(() => { alert("Sessão Arquivada!"); location.reload(); });
    }

    function copiarIA() {
        const txt = `[MÉTODO
